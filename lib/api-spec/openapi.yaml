      summary: Write up interview answers into journal fields in the coach's voice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewWriteupRequest"
      responses:
        "200":
          description: Drafted journal content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewWriteupResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Players ──────────────────────────────────────────────────────────────

    Player:
      type: object
      properties:
        id:        { type: integer }
        name:      { type: string }
        position:  { type: ["string", "null"] }
        club:      { type: ["string", "null"] }
        dob:       { type: ["string", "null"] }
        createdAt: { type: string }
      required: [id, name, createdAt]

    PlayerInput:
      type: object
      properties:
        name:     { type: string }
        position: { type: ["string", "null"] }
        club:     { type: ["string", "null"] }
        dob:      { type: ["string", "null"] }
      required: [name]

    PlayerUpdate:
      type: object
      properties:
        name:     { type: string }
        position: { type: ["string", "null"] }
        club:     { type: ["string", "null"] }
        dob:      { type: ["string", "null"] }

    # ── Teams ─────────────────────────────────────────────────────────────────

    Team:
      type: object
      properties:
        id:               { type: integer }
        name:             { type: string }
        gender:           { type: string }
        ageGroup:         { type: string }
        analyticsEnabled: { type: boolean }
        clubName:         { type: string }
      required: [id, name, gender, ageGroup, analyticsEnabled, clubName]

    # ── Seasons ───────────────────────────────────────────────────────────────

    Season:
      type: object
      properties:
        id:         { type: integer }
        leagueId:   { type: integer }
        leagueName: { type: string }
        year:       { type: string }
        label:      { type: string }
        isActive:   { type: boolean }
      required: [id, leagueId, leagueName, year, label, isActive]

    SeasonInput:
      type: object
      properties:
        leagueId: { type: integer }
        year:     { type: string }
        label:    { type: string }
        isActive: { type: boolean }
      required: [leagueId, year, label]

    LeagueInfo:
      type: object
      properties:
        id:     { type: integer }
        name:   { type: string }
        region: { type: string, nullable: true }
      required: [id, name]

    LeagueInput:
      type: object
      properties:
        name:   { type: string }
        region: { type: string }
      required: [name]

    # ── Matches ───────────────────────────────────────────────────────────────

    Match:
      type: object
      properties:
        id:             { type: integer }
        matchId:        { type: string }
        matchDate:      { type: ["string", "null"] }
        venue:          { type: ["string", "null"] }
        opponent:       { type: string }
        halfScore:      { type: ["string", "null"] }
        fullScore:      { type: ["string", "null"] }
        goalsScored:    { type: ["integer", "null"] }
        goalsConceded:  { type: ["integer", "null"] }
        cleanSheet:     { type: ["boolean", "null"] }
        formation:      { type: ["string", "null"] }
        oppFormation:   { type: ["string", "null"] }
        conditions:     { type: ["string", "null"] }
        possession:     { type: ["number", "null"] }
        shots:          { type: ["integer", "null"] }
        passes:         { type: ["integer", "null"] }
        oppShots:       { type: ["integer", "null"] }
        oppPasses:      { type: ["integer", "null"] }
        quadrantPoints: { type: ["string", "null"] }
        teamId:         { type: integer }
        seasonId:       { type: integer }
        result:         { type: ["string", "null"] }
      required: [id, matchId, opponent, teamId, seasonId]

    MatchInput:
      type: object
      properties:
        matchId:        { type: string }
        matchDate:      { type: ["string", "null"] }
        venue:          { type: ["string", "null"] }
        opponent:       { type: string }
        halfScore:      { type: ["string", "null"] }
        fullScore:      { type: ["string", "null"] }
        goalsScored:    { type: ["integer", "null"] }
        goalsConceded:  { type: ["integer", "null"] }
        cleanSheet:     { type: ["boolean", "null"] }
        formation:      { type: ["string", "null"] }
        oppFormation:   { type: ["string", "null"] }
        conditions:     { type: ["string", "null"] }
        possession:     { type: ["number", "null"] }
        shots:          { type: ["integer", "null"] }
        passes:         { type: ["integer", "null"] }
        oppShots:       { type: ["integer", "null"] }
        oppPasses:      { type: ["integer", "null"] }
        quadrantPoints: { type: ["string", "null"] }
        teamId:         { type: integer }
        seasonId:       { type: integer }
      required: [matchId, opponent, teamId, seasonId]

    MatchUpdate:
      type: object
      properties:
        matchDate:      { type: ["string", "null"] }
        venue:          { type: ["string", "null"] }
        opponent:       { type: string }
        halfScore:      { type: ["string", "null"] }
        fullScore:      { type: ["string", "null"] }
        goalsScored:    { type: ["integer", "null"] }
        goalsConceded:  { type: ["integer", "null"] }
        cleanSheet:     { type: ["boolean", "null"] }
        formation:      { type: ["string", "null"] }
        oppFormation:   { type: ["string", "null"] }
        conditions:     { type: ["string", "null"] }
        possession:     { type: ["number", "null"] }
        shots:          { type: ["integer", "null"] }
        passes:         { type: ["integer", "null"] }
        oppShots:       { type: ["integer", "null"] }
        oppPasses:      { type: ["integer", "null"] }
        quadrantPoints: { type: ["string", "null"] }

    # ── Player Stats ──────────────────────────────────────────────────────────

    PlayerStat:
      type: object
      properties:
        id:          { type: integer }
        matchId:     { type: integer }
        playerId:    { type: integer }
        playerName:  { type: string }
        minsPlayed:  { type: ["integer", "null"] }
        position:    { type: ["string", "null"] }
        discipline:  { type: ["string", "null"] }
        started:     { type: ["boolean", "null"] }
        appearance:  { type: ["boolean", "null"] }
        club:        { type: ["string", "null"] }
        year:        { type: ["string", "null"] }
      required: [id, matchId, playerId, playerName]

    PlayerStatInput:
      type: object
      properties:
        matchId:    { type: integer }
        playerId:   { type: integer }
        minsPlayed: { type: ["integer", "null"] }
        position:   { type: ["string", "null"] }
        discipline: { type: ["string", "null"] }
        started:    { type: ["boolean", "null"] }
        appearance: { type: ["boolean", "null"] }
        club:       { type: ["string", "null"] }
        year:       { type: ["string", "null"] }
      required: [matchId, playerId]

    # ── Goals ─────────────────────────────────────────────────────────────────

    Goal:
      type: object
      properties:
        id:               { type: integer }
        matchId:          { type: integer }
        recording:        { type: ["string", "null"] }
        matchDate:        { type: ["string", "null"] }
        homeTeam:         { type: ["string", "null"] }
        awayTeam:         { type: ["string", "null"] }
        scorerTeam:       { type: ["string", "null"] }
        minuteScored:     { type: ["integer", "null"] }
        scorer:           { type: ["string", "null"] }
        assist:           { type: ["string", "null"] }
        goalType:         { type: ["string", "null"] }
        assistType:       { type: ["string", "null"] }
        howPenetrated:    { type: ["string", "null"] }
        buildupLane:      { type: ["string", "null"] }
        firstTimeFinish:  { type: ["boolean", "null"] }
        finishType:       { type: ["string", "null"] }
        passString:       { type: ["string", "null"] }
        goalX:            { type: ["number", "null"] }
        goalY:            { type: ["number", "null"] }
        teamId:           { type: integer }
        seasonId:         { type: integer }
      required: [id, matchId, teamId, seasonId]

    GoalInput:
      type: object
      properties:
        matchId:          { type: integer }
        recording:        { type: ["string", "null"] }
        matchDate:        { type: ["string", "null"] }
        homeTeam:         { type: ["string", "null"] }
        awayTeam:         { type: ["string", "null"] }
        scorerTeam:       { type: ["string", "null"] }
        minuteScored:     { type: ["integer", "null"] }
        scorer:           { type: ["string", "null"] }
        assist:           { type: ["string", "null"] }
        goalType:         { type: ["string", "null"] }
        assistType:       { type: ["string", "null"] }
        howPenetrated:    { type: ["string", "null"] }
        buildupLane:      { type: ["string", "null"] }
        firstTimeFinish:  { type: ["boolean", "null"] }
        finishType:       { type: ["string", "null"] }
        passString:       { type: ["string", "null"] }
        goalX:            { type: ["number", "null"] }
        goalY:            { type: ["number", "null"] }
        teamId:           { type: integer }
        seasonId:         { type: integer }
      required: [matchId, teamId, seasonId]

    GoalUpdate:
      type: object
      properties:
        minuteScored:    { type: ["integer", "null"] }
        scorer:          { type: ["string", "null"] }
        assist:          { type: ["string", "null"] }
        goalType:        { type: ["string", "null"] }
        assistType:      { type: ["string", "null"] }
        howPenetrated:   { type: ["string", "null"] }
        buildupLane:     { type: ["string", "null"] }
        firstTimeFinish: { type: ["boolean", "null"] }
        finishType:      { type: ["string", "null"] }
        passString:      { type: ["string", "null"] }
        goalX:           { type: ["number", "null"] }
        goalY:           { type: ["number", "null"] }

    # ── GPS Sessions ──────────────────────────────────────────────────────────

    GpsPlayerPosition:
      type: object
      properties:
        playerName: { type: string }
        position:   { type: string, enum: [GK, Defender, Midfielder, Forward] }
      required: [playerName, position]

    GpsPlayerPositionInput:
      type: object
      properties:
        playerName: { type: string }
        position:   { type: ["string", "null"], enum: [GK, Defender, Midfielder, Forward, null] }
      required: [playerName]

    GpsPlayerPositionsSaveResult:
      type: object
      properties:
        saved:   { type: integer }
        removed: { type: integer }
      required: [saved, removed]

    GpsSession:
      type: object
      properties:
        id:                  { type: integer }
        sessionDate:         { type: ["string", "null"] }
        sessionTitle:        { type: ["string", "null"] }
        playerName:          { type: string }
        playerId:            { type: ["integer", "null"] }
        teamId:              { type: integer }
        year:                { type: string }
        round:               { type: ["string", "null"] }
        opponent:            { type: ["string", "null"] }
        splitName:           { type: ["string", "null"] }
        tags:                { type: ["string", "null"] }
        minsPlayed:          { type: ["number", "null"] }
        distanceKm:          { type: ["number", "null"] }
        sprintDistanceM:     { type: ["number", "null"] }
        powerPlays:          { type: ["number", "null"] }
        energyKcal:          { type: ["number", "null"] }
        impacts:             { type: ["number", "null"] }
        hrLoad:              { type: ["number", "null"] }
        timeInRedZoneMin:    { type: ["number", "null"] }
        playerLoad:          { type: ["number", "null"] }
        topSpeedMs:          { type: ["number", "null"] }
        distancePerMinMm:    { type: ["number", "null"] }
        powerScoreWkg:       { type: ["number", "null"] }
        workRatio:           { type: ["number", "null"] }
        hrMaxBpm:            { type: ["number", "null"] }
        maxDecelerationMss:  { type: ["number", "null"] }
        maxAccelerationMss:  { type: ["number", "null"] }
        distanceZone1Km:     { type: ["number", "null"] }
        distanceZone2Km:     { type: ["number", "null"] }
        distanceZone3Km:     { type: ["number", "null"] }
        distanceZone4Km:     { type: ["number", "null"] }
        distanceZone5Km:     { type: ["number", "null"] }
        accelCount34:        { type: ["number", "null"] }
        accelCountOver4:     { type: ["number", "null"] }
        decelCount34:        { type: ["number", "null"] }
        decelCountOver4:     { type: ["number", "null"] }
      required: [id, playerName, teamId, year]

    GpsSessionInput:
      type: object
      properties:
        sessionDate:         { type: ["string", "null"] }
        sessionTitle:        { type: ["string", "null"] }
        playerName:          { type: string }
        playerId:            { type: ["integer", "null"] }
        teamId:              { type: integer }
        year:                { type: string }
        round:               { type: ["string", "null"] }
        opponent:            { type: ["string", "null"] }
        splitName:           { type: ["string", "null"] }
        tags:                { type: ["string", "null"] }
        minsPlayed:          { type: ["number", "null"] }
        distanceKm:          { type: ["number", "null"] }
        sprintDistanceM:     { type: ["number", "null"] }
        powerPlays:          { type: ["number", "null"] }
        energyKcal:          { type: ["number", "null"] }
        impacts:             { type: ["number", "null"] }
        hrLoad:              { type: ["number", "null"] }
        timeInRedZoneMin:    { type: ["number", "null"] }
        playerLoad:          { type: ["number", "null"] }
        topSpeedMs:          { type: ["number", "null"] }
        distancePerMinMm:    { type: ["number", "null"] }
        powerScoreWkg:       { type: ["number", "null"] }
        workRatio:           { type: ["number", "null"] }
        hrMaxBpm:            { type: ["number", "null"] }
        maxDecelerationMss:  { type: ["number", "null"] }
        maxAccelerationMss:  { type: ["number", "null"] }
        distanceZone1Km:     { type: ["number", "null"] }
        distanceZone2Km:     { type: ["number", "null"] }
        distanceZone3Km:     { type: ["number", "null"] }
        distanceZone4Km:     { type: ["number", "null"] }
        distanceZone5Km:     { type: ["number", "null"] }
        accelCount34:        { type: ["number", "null"] }
        accelCountOver4:     { type: ["number", "null"] }
        decelCount34:        { type: ["number", "null"] }
        decelCountOver4:     { type: ["number", "null"] }
      required: [playerName, teamId, year]

    # ── Athletic Tests ────────────────────────────────────────────────────────

    AthleticTest:
      type: object
      properties:
        id:            { type: integer }
        playerId:      { type: ["integer", "null"] }
        playerName:    { type: string }
        teamId:        { type: integer }
        year:          { type: string }
        position:      { type: ["string", "null"] }
        verticalStart: { type: ["number", "null"] }
        verticalM:     { type: ["number", "null"] }
        verticalTotal: { type: ["number", "null"] }
        horizontalM:   { type: ["number", "null"] }
        balsomS:       { type: ["number", "null"] }
        split010:      { type: ["number", "null"] }
        split1020:     { type: ["number", "null"] }
        split2030:     { type: ["number", "null"] }
        total30m:      { type: ["number", "null"] }
      required: [id, playerName, teamId, year]

    AthleticTestInput:
      type: object
      properties:
        playerId:      { type: ["integer", "null"] }
        playerName:    { type: string }
        teamId:        { type: integer }
        year:          { type: string }
        position:      { type: ["string", "null"] }
        verticalStart: { type: ["number", "null"] }
        verticalM:     { type: ["number", "null"] }
        verticalTotal: { type: ["number", "null"] }
        horizontalM:   { type: ["number", "null"] }
        balsomS:       { type: ["number", "null"] }
        split010:      { type: ["number", "null"] }
        split1020:     { type: ["number", "null"] }
        split2030:     { type: ["number", "null"] }
        total30m:      { type: ["number", "null"] }
      required: [playerName, teamId, year]

    # ── Analytics / Summaries ─────────────────────────────────────────────────

    SeasonSummary:
      type: object
      properties:
        matchesPlayed:    { type: integer }
        wins:             { type: integer }
        draws:            { type: integer }
        losses:           { type: integer }
        goalsScored:      { type: integer }
        goalsConceded:    { type: integer }
        goalDifference:   { type: integer }
        cleanSheets:      { type: integer }
        winRate:          { type: number }
        avgGoalsScored:   { type: number }
        avgGoalsConceded: { type: number }
        topScorer:        { type: ["string", "null"] }
        topScorerGoals:   { type: ["integer", "null"] }
        teamName:         { type: string }
        seasonLabel:      { type: string }
      required: [matchesPlayed, wins, draws, losses, goalsScored, goalsConceded, goalDifference, cleanSheets, winRate, avgGoalsScored, avgGoalsConceded, teamName, seasonLabel]

    PlayerLeaderboardEntry:
      type: object
      properties:
        playerId:             { type: integer }
        playerName:           { type: string }
        position:             { type: ["string", "null"] }
        goals:                { type: integer }
        assists:              { type: integer }
        appearances:          { type: integer }
        starts:               { type: integer }
        minsPlayed:           { type: integer }
        minsPerGoal:          { type: ["number", "null"] }
        minsPerAssist:        { type: ["number", "null"] }
        yellowCards:          { type: integer }
        redCards:             { type: integer }
        goalsFor:             { type: integer }
        goalsConceded:        { type: integer }
        minsPerGoalConceded:  { type: ["number", "null"] }
      required: [playerId, playerName, goals, assists, appearances, starts, minsPlayed, yellowCards, redCards, goalsFor, goalsConceded]

    OpponentLeaderboardEntry:
      type: object
      properties:
        playerName:    { type: string }
        position:      { type: ["string", "null"] }
        appearances:   { type: integer }
        starts:        { type: integer }
        minsPlayed:    { type: integer }
        yellowCards:   { type: integer }
        redCards:      { type: integer }
        goalsFor:      { type: integer }
        goalsConceded: { type: integer }
      required: [playerName, appearances, starts, minsPlayed, yellowCards, redCards, goalsFor, goalsConceded]

    HeadToHeadRecord:
      type: object
      properties:
        played:       { type: integer }
        won:          { type: integer }
        drawn:        { type: integer }
        lost:         { type: integer }
        goalsFor:     { type: integer }
        goalsAgainst: { type: integer }
      required: [played, won, drawn, lost, goalsFor, goalsAgainst]

    MatchHistoryEntry:
      type: object
      properties:
        matchId:       { type: integer }
        matchDate:     { type: ["string", "null"] }
        goalsScored:   { type: integer }
        goalsConceded: { type: integer }
        result:        { type: string }
      required: [matchId, goalsScored, goalsConceded, result]

    OpponentLeaderboardResponse:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/OpponentLeaderboardEntry"
        headToHead:
          $ref: "#/components/schemas/HeadToHeadRecord"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/MatchHistoryEntry"
      required: [players, headToHead, matches]

    LadderEntry:
      type: object
      properties:
        teamName:      { type: string }
        played:        { type: integer }
        won:           { type: integer }
        drawn:         { type: integer }
        lost:          { type: integer }
        goalsFor:      { type: integer }
        goalsAgainst:  { type: integer }
        goalDiff:      { type: integer }
        points:        { type: integer }
        isFocusTeam:   { type: boolean }
      required: [teamName, played, won, drawn, lost, goalsFor, goalsAgainst, goalDiff, points, isFocusTeam]

    TeamForm:
      type: object
      properties:
        recentResults:
          type: array
          items:
            $ref: "#/components/schemas/FormResult"
        formString:  { type: string }
        winsLast5:   { type: integer }
        drawsLast5:  { type: integer }
        lossesLast5: { type: integer }
      required: [recentResults, formString, winsLast5, drawsLast5, lossesLast5]

    FormResult:
      type: object
      properties:
        opponent:      { type: string }
        result:        { type: string }
        goalsScored:   { type: integer }
        goalsConceded: { type: integer }
        matchDate:     { type: ["string", "null"] }
      required: [opponent, result, goalsScored, goalsConceded]

    GoalIntervalBucket:
      type: object
      properties:
        interval:         { type: string }
        goalsScored:      { type: integer }
        goalsConceded:    { type: integer }
        intervalStart:    { type: integer }
        intervalEnd:      { type: integer }
      required: [interval, goalsScored, goalsConceded, intervalStart, intervalEnd]

    ScoredGoalRecord:
      type: object
      properties:
        id:              { type: integer }
        matchId:         { type: ["integer", "null"] }
        minuteScored:    { type: ["integer", "null"] }
        goalType:        { type: ["string", "null"] }
        assistType:      { type: ["string", "null"] }
        buildupLane:     { type: ["string", "null"] }
        finishType:      { type: ["string", "null"] }
        howPenetrated:   { type: ["string", "null"] }
        firstTimeFinish: { type: ["boolean", "null"] }
        passString:      { type: ["string", "null"] }
        goalX:           { type: ["number", "null"] }
        goalY:           { type: ["number", "null"] }
        scorer:          { type: ["string", "null"] }
        assist:          { type: ["string", "null"] }
        opponent:        { type: ["string", "null"] }
        matchDate:       { type: ["string", "null"] }
        matchCode:       { type: ["string", "null"] }
        matchResult:     { type: ["string", "null"] }
      required: [id]

    GoalBreakdownResponse:
      type: object
      properties:
        opponents:
          type: array
          items: { type: string }
        goals:
          type: array
          items: { $ref: "#/components/schemas/ScoredGoalRecord" }
        conceded:
          type: array
          items: { $ref: "#/components/schemas/ScoredGoalRecord" }
      required: [opponents, goals, conceded]

    GpsLoadSummary:
      type: object
      properties:
        playerId:          { type: ["integer", "null"] }
        playerName:        { type: string }
        sessions:          { type: integer }
        avgDistanceKm:     { type: ["number", "null"] }
        avgSprintDistanceM: { type: ["number", "null"] }
        avgPlayerLoad:     { type: ["number", "null"] }
        avgTopSpeedMs:     { type: ["number", "null"] }
        avgHrLoad:         { type: ["number", "null"] }
        totalDistanceKm:   { type: ["number", "null"] }
        maxTopSpeedMs:     { type: ["number", "null"] }
      required: [playerName, sessions]

    # ── Clubs ─────────────────────────────────────────────────────────────────

    ClubInfo:
      type: object
      properties:
        id:           { type: integer }
        leagueId:     { type: integer }
        name:         { type: string }
        primaryColor: { type: string }
        logoUrl:      { type: ["string", "null"] }
      required: [id, leagueId, name, primaryColor]

    ClubInput:
      type: object
      properties:
        leagueId:     { type: integer }
        name:         { type: string }
        primaryColor: { type: string }
      required: [leagueId, name]

    # ── Goals by Opponent ──────────────────────────────────────────────────────

    GoalsByOpponentEntry:
      type: object
      properties:
        goals:      { type: integer }
        minsPlayed: { type: integer }
      required: [goals, minsPlayed]

    GoalsByOpponentPlayer:
      type: object
      properties:
        playerName: { type: string }
        totalMins:  { type: integer }
        totalGoals: { type: integer }
        byOpponent:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/GoalsByOpponentEntry"
      required: [playerName, totalMins, totalGoals, byOpponent]

    GoalsByOpponentResponse:
      type: object
      properties:
        opponents:
          type: array
          items: { type: string }
        players:
          type: array
          items:
            $ref: "#/components/schemas/GoalsByOpponentPlayer"
      required: [opponents, players]

    # ── Assists by Opponent ────────────────────────────────────────────────────

    AssistsByOpponentEntry:
      type: object
      properties:
        assists:    { type: integer }
        minsPlayed: { type: integer }
      required: [assists, minsPlayed]

    AssistsByOpponentPlayer:
      type: object
      properties:
        playerName:   { type: string }
        totalMins:    { type: integer }
        totalAssists: { type: integer }
        byOpponent:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AssistsByOpponentEntry"
      required: [playerName, totalMins, totalAssists, byOpponent]

    AssistsByOpponentResponse:
      type: object
      properties:
        opponents:
          type: array
          items: { type: string }
        players:
          type: array
          items:
            $ref: "#/components/schemas/AssistsByOpponentPlayer"
      required: [opponents, players]

    # ── Opponent Players by Opponent (club-scoped goals/assists/mins) ───────────

    OpponentPlayerByOpponentEntry:
      type: object
      properties:
        goals:      { type: integer }
        assists:    { type: integer }
        minsPlayed: { type: integer }
      required: [goals, assists, minsPlayed]

    OpponentPlayerByOpponentPlayer:
      type: object
      properties:
        playerName:   { type: string }
        totalMins:    { type: integer }
        totalGoals:   { type: integer }
        totalAssists: { type: integer }
        totalStarts:  { type: integer }
        totalApps:    { type: integer }
        byOpponent:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/OpponentPlayerByOpponentEntry"
      required: [playerName, totalMins, totalGoals, totalAssists, totalStarts, totalApps, byOpponent]

    OpponentPlayersByOpponentResponse:
      type: object
      properties:
        opponents:
          type: array
          items: { type: string }
        players:
          type: array
          items:
            $ref: "#/components/schemas/OpponentPlayerByOpponentPlayer"
      required: [opponents, players]

    # ── Goal Combos (assist → scorer partnerships) ─────────────────────────────

    GoalCombo:
      type: object
      properties:
        assister: { type: string }
        scorer:   { type: string }
        count:    { type: integer }
      required: [assister, scorer, count]

    GoalCombosResponse:
      type: object
      properties:
        combos:
          type: array
          items: { $ref: "#/components/schemas/GoalCombo" }
        totalGoals:    { type: integer }
        assistedGoals: { type: integer }
      required: [combos, totalGoals, assistedGoals]

    # ── Coach behaviour: first substitution ────────────────────────────────────

    FirstSubEntry:
      type: object
      properties:
        matchId:       { type: string }
        opponent:      { type: string }
        matchDate:     { type: string, nullable: true }
        minute:        { type: integer }
        player:        { type: string }
        gameState:     { type: string, enum: [Winning, Drawing, Losing] }
        result:        { type: string, enum: [W, D, L] }
        goalsFor15:    { type: integer }
        goalsAgainst15: { type: integer }
      required: [matchId, opponent, matchDate, minute, player, gameState, result, goalsFor15, goalsAgainst15]

    FirstSubStateSummary:
      type: object
      properties:
        state:        { type: string, enum: [Winning, Drawing, Losing] }
        matches:      { type: integer }
        avgMinute:    { type: number }
        goalsFor:     { type: integer }
        goalsAgainst: { type: integer }
        noGoal:       { type: integer }
        wins:         { type: integer }
        draws:        { type: integer }
        losses:       { type: integer }
      required: [state, matches, avgMinute, goalsFor, goalsAgainst, noGoal, wins, draws, losses]

    FirstSubResponse:
      type: object
      properties:
        matchesTracked:    { type: integer }
        avgFirstSubMinute: { type: number, nullable: true }
        subsPerMatch:      { type: number, nullable: true }
        preferredPlayer:   { type: string, nullable: true }
        preferredCount:    { type: integer }
        entries:
          type: array
          items: { $ref: "#/components/schemas/FirstSubEntry" }
        byState:
          type: array
          items: { $ref: "#/components/schemas/FirstSubStateSummary" }
      required: [matchesTracked, avgFirstSubMinute, subsPerMatch, preferredPlayer, preferredCount, entries, byState]

    # ── Player Scoring DNA (radar) ─────────────────────────────────────────────

    PlayerDnaMetrics:
      type: object
      properties:
        goals:         { type: integer }
        goalsPer90:    { type: number }
        assists:       { type: integer }
        assistsPer90:  { type: number }
        firstTouchPct: { type: number }
        poacherPct:       { type: number }
        rightFoot:     { type: integer }
        leftFoot:      { type: integer }
        header:        { type: integer }
      required: [goals, goalsPer90, assists, assistsPer90, firstTouchPct, poacherPct, rightFoot, leftFoot, header]

    # Squad averages — same axes as PlayerDnaMetrics but every field is fractional.
    PlayerDnaAverages:
      type: object
      properties:
        goals:         { type: number }
        goalsPer90:    { type: number }
        assists:       { type: number }
        assistsPer90:  { type: number }
        firstTouchPct: { type: number }
        poacherPct:       { type: number }
        rightFoot:     { type: number }
        leftFoot:      { type: number }
        header:        { type: number }
      required: [goals, goalsPer90, assists, assistsPer90, firstTouchPct, poacherPct, rightFoot, leftFoot, header]

    PlayerDnaBest:
      type: object
      properties:
        label: { type: string }
        count: { type: integer }
      required: [label, count]

    PlayerDnaResponse:
      type: object
      properties:
        player:            { type: string }
        minsPlayed:        { type: integer }
        appearances:       { type: integer }
        minsPerGoal:       { type: ["integer", "null"] }
        metrics:           { $ref: "#/components/schemas/PlayerDnaMetrics" }
        squadMax:          { $ref: "#/components/schemas/PlayerDnaMetrics" }
        squadAvg:          { $ref: "#/components/schemas/PlayerDnaAverages" }
        firstTouchYes:     { type: integer }
        firstTouchTotal:   { type: integer }
        poacherYes:           { type: integer }
        poacherTotal:         { type: integer }
        favouriteOpponent: { oneOf: [{ $ref: "#/components/schemas/PlayerDnaBest" }, { type: "null" }] }
        topAssistPartner:  { oneOf: [{ $ref: "#/components/schemas/PlayerDnaBest" }, { type: "null" }] }
      required: [player, minsPlayed, appearances, minsPerGoal, metrics, squadMax, squadAvg, firstTouchYes, firstTouchTotal, poacherYes, poacherTotal, favouriteOpponent, topAssistPartner]

    # ── Opponent Goal Breakdown ────────────────────────────────────────────────

    OpponentGoalDetail:
      type: object
      properties:
        id:              { type: integer }
        minuteScored:    { type: ["integer", "null"] }
        goalType:        { type: ["string", "null"] }
        assistType:      { type: ["string", "null"] }
        buildupLane:     { type: ["string", "null"] }
        howPenetrated:   { type: ["string", "null"] }
        finishType:      { type: ["string", "null"] }
        firstTimeFinish: { type: ["boolean", "null"] }
        scorer:          { type: ["string", "null"] }
        assist:          { type: ["string", "null"] }
        matchDate:       { type: ["string", "null"] }
      required: [id]

    OpponentGoalBreakdownResponse:
      type: object
      properties:
        scored:
          type: array
          items: { $ref: "#/components/schemas/OpponentGoalDetail" }
        conceded:
          type: array
          items: { $ref: "#/components/schemas/OpponentGoalDetail" }
      required: [scored, conceded]

    # ── Opponent Profile (club-centric scouting across all their games) ─────────

    OpponentProfileRecord:
      type: object
      properties:
        played:       { type: integer }
        won:          { type: integer }
        drawn:        { type: integer }
        lost:         { type: integer }
        goalsFor:     { type: integer }
        goalsAgainst: { type: integer }
        goalDiff:     { type: integer }
        points:       { type: integer }
        position:     { type: ["integer", "null"] }
      required: [played, won, drawn, lost, goalsFor, goalsAgainst, goalDiff, points, position]

    OpponentProfileMatch:
      type: object
      properties:
        matchId:   { type: string }
        matchDate: { type: ["string", "null"] }
        opponent:  { type: string }
        homeAway:  { type: string }
        scored:    { type: integer }
        conceded:  { type: integer }
        result:    { type: string }
      required: [matchId, matchDate, opponent, homeAway, scored, conceded, result]

    OpponentProfileBucket:
      type: object
      properties:
        label: { type: string }
        total: { type: integer }
        byOpponent:
          type: object
          additionalProperties: { type: integer }
      required: [label, total, byOpponent]

    OpponentProfileScorer:
      type: object
      properties:
        scorer: { type: string }
        goals:  { type: integer }
      required: [scorer, goals]

    # Raw goal record (club-relative) powering detail-by-type, goal-map, 5-min response, first-goal.
    OpponentProfileGoal:
      type: object
      properties:
        matchId:         { type: string }
        matchDate:       { type: ["string", "null"] }
        minuteScored:    { type: ["integer", "null"] }
        side:            { type: string }                 # "scored" | "conceded" (relative to selected club)
        opponent:        { type: string }                 # the OTHER team in that fixture
        scorer:          { type: ["string", "null"] }
        assist:          { type: ["string", "null"] }
        goalType:        { type: ["string", "null"] }
        assistType:      { type: ["string", "null"] }
        howPenetrated:   { type: ["string", "null"] }
        buildupLane:     { type: ["string", "null"] }
        firstTimeFinish: { type: ["boolean", "null"] }
        finishType:      { type: ["string", "null"] }
        passString:      { type: ["string", "null"] }
        goalX:           { type: ["string", "null"] }
        goalY:           { type: ["string", "null"] }
      required: [matchId, matchDate, minuteScored, side, opponent, scorer, assist, goalType, assistType, howPenetrated, buildupLane, firstTimeFinish, finishType, passString, goalX, goalY]

    # Per-player season aggregate for the selected club (or whole league under __ALL__).
    OpponentProfilePlayer:
      type: object
      properties:
        playerName:  { type: string }
        club:        { type: ["string", "null"] }
        minsPlayed:  { type: integer }
        starts:      { type: integer }
        appearances: { type: integer }
        goals:       { type: integer }
        assists:     { type: integer }
      required: [playerName, club, minsPlayed, starts, appearances, goals, assists]

    PlayerTimelineMatch:
      type: object
      properties:
        matchId:   { type: string }
        matchDate: { type: ["string", "null"] }
        opponent:  { type: ["string", "null"] }
        status:    { type: string, enum: [start, bench, out] }
        minutes:   { type: integer }
      required: [matchId, matchDate, opponent, status, minutes]

    PlayerTimelineResponse:
      type: object
      properties:
        player:  { type: string }
        club:    { type: string }
        matches:
          type: array
          items:
            $ref: "#/components/schemas/PlayerTimelineMatch"
      required: [player, club, matches]

    OpponentProfileResponse:
      type: object
      # NOTE: playersLast3 = same aggregate as players, but only over the
      # club's 3 most-recent fixtures (empty for the __ALL__ view).
      properties:
        club:      { type: string }
        opponents:
          type: array
          items: { type: string }
        record:
          $ref: "#/components/schemas/OpponentProfileRecord"
        matches:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfileMatch" }
        scoredByInterval:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfileBucket" }
        concededByInterval:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfileBucket" }
        scoredByType:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfileBucket" }
        concededByType:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfileBucket" }
        topScorers:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfileScorer" }
        goals:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfileGoal" }
        players:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfilePlayer" }
        playersLast3:
          type: array
          items: { $ref: "#/components/schemas/OpponentProfilePlayer" }
      required: [club, opponents, record, matches, scoredByInterval, concededByInterval, scoredByType, concededByType, topScorers, goals, players, playersLast3]

    AdminLoginBody:
      type: object
      properties:
        password: { type: string }
      required: [password]

    AuthStatus:
      type: object
      properties:
        authenticated: { type: boolean }
        role:
          type: string
          enum: [admin, viewer]
          description: Present when authenticated. Admin can write data; viewer is read-only (future club logins).
      required: [authenticated]

    LeagueMatchInfo:
      type: object
      properties:
        id:        { type: integer }
        matchId:   { type: string }
        matchDate: { type: ["string", "null"] }
        homeTeam:  { type: string }
        awayTeam:  { type: string }
        fullScore: { type: ["string", "null"] }
        homeGoals: { type: ["integer", "null"] }
        awayGoals: { type: ["integer", "null"] }
      required: [id, matchId, matchDate, homeTeam, awayTeam, fullScore, homeGoals, awayGoals]

    GoalOptionsResponse:
      type: object
      properties:
        goalTypes:     { type: array, items: { type: string } }
        assistTypes:   { type: array, items: { type: string } }
        howPenetrated: { type: array, items: { type: string } }
        buildupLanes:  { type: array, items: { type: string } }
        finishTypes:   { type: array, items: { type: string } }
        conditions:    { type: array, items: { type: string } }
        venues:        { type: array, items: { type: string } }
        formations:    { type: array, items: { type: string } }
      required: [goalTypes, assistTypes, howPenetrated, buildupLanes, finishTypes, conditions, venues, formations]

    EntryMatchBody:
      type: object
      properties:
        teamId:       { type: integer }
        seasonId:     { type: integer }
        matchId:      { type: string, minLength: 1 }
        matchDate:    { type: string, minLength: 1 }
        homeTeam:     { type: string, minLength: 1 }
        awayTeam:     { type: string, minLength: 1 }
        homeGoals:    { type: integer, minimum: 0 }
        awayGoals:    { type: integer, minimum: 0 }
        venue:        { type: ["string", "null"] }
        halfScore:    { type: ["string", "null"] }
        conditions:   { type: ["string", "null"] }
        formation:    { type: ["string", "null"] }
        oppFormation: { type: ["string", "null"] }
        possession:   { type: ["number", "null"], minimum: 0, maximum: 100 }
        shots:        { type: ["integer", "null"], minimum: 0 }
        passes:       { type: ["integer", "null"], minimum: 0 }
        oppShots:     { type: ["integer", "null"], minimum: 0 }
        oppPasses:    { type: ["integer", "null"], minimum: 0 }
      required: [teamId, seasonId, matchId, matchDate, homeTeam, awayTeam, homeGoals, awayGoals]

    EntryMatchResponse:
      type: object
      properties:
        leagueMatchId:    { type: integer }
        belconnenMatchId: { type: ["integer", "null"] }
        fullScore:        { type: string }
      required: [leagueMatchId, belconnenMatchId, fullScore]

    EntryGoalBody:
      type: object
      properties:
        teamId:          { type: integer }
        seasonId:        { type: integer }
        matchId:         { type: string, minLength: 1 }
        scorerTeam:      { type: string, minLength: 1 }
        minuteScored:    { type: ["integer", "null"], minimum: 0, maximum: 130 }
        scorer:          { type: ["string", "null"] }
        assist:          { type: ["string", "null"] }
        goalType:        { type: ["string", "null"] }
        assistType:      { type: ["string", "null"] }
        howPenetrated:   { type: ["string", "null"] }
        buildupLane:     { type: ["string", "null"] }
        firstTimeFinish: { type: ["boolean", "null"] }
        finishType:      { type: ["string", "null"] }
        passString:      { type: ["string", "null"] }
        goalX:           { type: ["number", "null"], minimum: 0, maximum: 100 }
        goalY:           { type: ["number", "null"], minimum: 0 }
      required: [teamId, seasonId, matchId, scorerTeam]

    EntryGoalResponse:
      type: object
      properties:
        leagueGoalId:    { type: integer }
        belconnenGoalId: { type: ["integer", "null"] }
      required: [leagueGoalId, belconnenGoalId]

    GoalTallyResponse:
      type: object
      properties:
        homeTeam:     { type: string }
        awayTeam:     { type: string }
        homeExpected: { type: ["integer", "null"] }
        awayExpected: { type: ["integer", "null"] }
        homeLogged:   { type: integer }
        awayLogged:   { type: integer }
      required: [homeTeam, awayTeam, homeExpected, awayExpected, homeLogged, awayLogged]

    PlayerTallyResponse:
      type: object
      properties:
        homeTeam:  { type: string }
        awayTeam:  { type: string }
        homeSaved: { type: integer }
        awaySaved: { type: integer }
      required: [homeTeam, awayTeam, homeSaved, awaySaved]

    EntryGoalListItem:
      type: object
      properties:
        id:           { type: integer }
        scorerTeam:   { type: ["string", "null"] }
        minuteScored: { type: ["integer", "null"] }
        scorer:       { type: ["string", "null"] }
        assist:       { type: ["string", "null"] }
        goalType:     { type: ["string", "null"] }
      required: [id, scorerTeam, minuteScored, scorer, assist, goalType]

    EntryGoalListResponse:
      type: object
      properties:
        goals:
          type: array
          items: { $ref: "#/components/schemas/EntryGoalListItem" }
      required: [goals]

    EntryGoalDeleteResponse:
      type: object
      properties:
        deleted:          { type: boolean }
        belconnenDeleted: { type: boolean }
      required: [deleted, belconnenDeleted]

    EntryPlayerRow:
      type: object
      properties:
        playerName: { type: string, minLength: 1 }
        minsPlayed: { type: ["integer", "null"], minimum: 0, maximum: 130 }
        position:   { type: ["string", "null"] }
        discipline: { type: ["string", "null"] }
        started:    { type: boolean }
        appearance: { type: boolean }
      required: [playerName, started, appearance]

    EntryPlayerStatsBody:
      type: object
      properties:
        teamId:   { type: integer }
        seasonId: { type: integer }
        matchId:  { type: string, minLength: 1 }
        club:     { type: string, minLength: 1 }
        year:     { type: ["string", "null"] }
        rows:
          type: array
          items: { $ref: "#/components/schemas/EntryPlayerRow" }
      required: [teamId, seasonId, matchId, club, rows]

    EntryPlayerStatsResponse:
      type: object
      properties:
        saved:           { type: integer }
        replaced:        { type: integer }
        belconnenCopies: { type: integer }
      required: [saved, replaced, belconnenCopies]

    EntrySavedPlayerRow:
      type: object
      properties:
        id:         { type: integer }
        playerName: { type: string }
        minsPlayed: { type: ["integer", "null"] }
        position:   { type: ["string", "null"] }
        discipline: { type: ["string", "null"] }
        started:    { type: boolean }
        appearance: { type: boolean }
      required: [id, playerName, minsPlayed, position, discipline, started, appearance]

    EntrySavedPlayersResponse:
      type: object
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/EntrySavedPlayerRow" }
      required: [rows]

    EntryPlayerStatDeleteResponse:
      type: object
      properties:
        deleted:          { type: boolean }
        belconnenDeleted: { type: boolean }
      required: [deleted, belconnenDeleted]

    EntryPlayerStatsClearResponse:
      type: object
      properties:
        removed:          { type: integer }
        belconnenRemoved: { type: integer }
      required: [removed, belconnenRemoved]

    EntryAthleticTestRow:
      type: object
      properties:
        playerName:    { type: string }
        position:      { type: ["string", "null"] }
        verticalStart: { type: ["number", "null"] }
        verticalM:     { type: ["number", "null"] }
        verticalTotal: { type: ["number", "null"] }
        horizontalM:   { type: ["number", "null"] }
        balsomS:       { type: ["number", "null"] }
        split010:      { type: ["number", "null"] }
        split1020:     { type: ["number", "null"] }
        split2030:     { type: ["number", "null"] }
        total30m:      { type: ["number", "null"] }
      required: [playerName]

    EntryAthleticTestsSaveRequest:
      type: object
      properties:
        year:   { type: string }
        teamId: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/EntryAthleticTestRow" }
      required: [year, teamId, rows]

    EntryAthleticTestsSaveResponse:
      type: object
      properties:
        saved:    { type: integer }
        replaced: { type: integer }
      required: [saved, replaced]

    EntryGpsSessionRow:
      type: object
      properties:
        playerName:        { type: string, minLength: 1 }
        splitName:         { type: ["string", "null"] }
        minsPlayed:        { type: ["number", "null"] }
        distanceKm:        { type: ["number", "null"] }
        sprintDistanceM:   { type: ["number", "null"] }
        powerPlays:        { type: ["number", "null"] }
        energyKcal:        { type: ["number", "null"] }
        impacts:           { type: ["number", "null"] }
        hrLoad:            { type: ["number", "null"] }
        timeInRedZoneMin:  { type: ["number", "null"] }
        playerLoad:        { type: ["number", "null"] }
        topSpeedMs:        { type: ["number", "null"] }
        distancePerMinMm:  { type: ["number", "null"] }
        powerScoreWkg:     { type: ["number", "null"] }
        workRatio:         { type: ["number", "null"] }
        hrMaxBpm:          { type: ["number", "null"] }
        maxDecelerationMss: { type: ["number", "null"] }
        maxAccelerationMss: { type: ["number", "null"] }
        distanceZone1Km:   { type: ["number", "null"] }
        distanceZone2Km:   { type: ["number", "null"] }
        distanceZone3Km:   { type: ["number", "null"] }
        distanceZone4Km:   { type: ["number", "null"] }
        distanceZone5Km:   { type: ["number", "null"] }
        accelCount34:      { type: ["number", "null"] }
        accelCountOver4:   { type: ["number", "null"] }
        decelCount34:      { type: ["number", "null"] }
        decelCountOver4:   { type: ["number", "null"] }
      required: [playerName]

    EntryGpsSessionsSaveRequest:
      type: object
      properties:
        year:         { type: string }
        teamId:       { type: integer }
        round:        { type: string, minLength: 1 }
        opponent:     { type: ["string", "null"] }
        sessionDate:  { type: ["string", "null"] }
        sessionTitle: { type: ["string", "null"] }
        rows:
          type: array
          items: { $ref: "#/components/schemas/EntryGpsSessionRow" }
      required: [year, teamId, round, rows]

    EntryGpsSessionsSaveResponse:
      type: object
      properties:
        saved:    { type: integer }
        replaced: { type: integer }
      required: [saved, replaced]

    ExtractPlayersBody:
      type: object
      properties:
        imageBase64: { type: string, minLength: 1 }
        club:        { type: ["string", "null"] }
      required: [imageBase64]

    ExtractPlayersResponse:
      type: object
      properties:
        rows:
          type: array
          items: { $ref: "#/components/schemas/EntryPlayerRow" }
        warnings:
          type: array
          items: { type: string }
      required: [rows, warnings]

    LibraryPara:
      type: object
      properties:
        text:  { type: string }
        size:  { type: ["number", "null"] }
        bold:  { type: boolean }
        color: { type: ["string", "null"] }
      required: [text]

    LibraryPractice:
      type: object
      properties:
        id:          { type: integer }
        ordinal:     { type: integer }
        kind:        { type: string }
        chapter:     { type: ["string", "null"] }
        sectionCode: { type: ["string", "null"] }
        sectionName: { type: ["string", "null"] }
        title:       { type: ["string", "null"] }
        paras:
          type: array
          items: { $ref: "#/components/schemas/LibraryPara" }
        diagram:
          type: object
          description: Resolved diagram ({ bg, canvas, shapes }) rendered as SVG client-side
          additionalProperties: true
        needsReview: { type: boolean }
        variationCount: { type: integer, description: "Number of imported wording variations available" }
        variationParts:
          type: array
          items: { type: string }
          description: "Distinct session parts (warmup/activation/introduction/main/endgame) this practice's past write-ups came from"
        reviewCrops:
          type: array
          description: Coach's snips; multiple entries = variations worked through in order
          items: { $ref: "#/components/schemas/DiagramCrop" }
          maxItems: 6
        reviewPart: { type: ["string", "null"], description: "warmup | activation | introduction | main | endgame | unusable; null = not yet reviewed" }
        reviewTags:
          type: array
          items: { type: string }
          description: "Sub-category tags, e.g. A5 or MP6"
      required: [id, ordinal, kind, paras, diagram, needsReview, variationCount, variationParts, reviewTags, reviewCrops]

    DiagramCrop:
      type: object
      description: Crop rectangle in diagram canvas coordinates (960x720 standard)
      properties:
        x: { type: number }
        y: { type: number }
        w: { type: number, minimum: 20 }
        h: { type: number, minimum: 20 }
      required: [x, y, w, h]

    ReviewLibraryPracticeRequest:
      type: object
      properties:
        part:
          type: string
          enum: [warmup, activation, introduction, main, endgame, unusable]
        tags:
          type: array
          items: { type: string, maxLength: 10 }
          maxItems: 12
        crops:
          type: array
          items: { $ref: "#/components/schemas/DiagramCrop" }
          maxItems: 6
      required: [part, tags]

    ReviewLibraryPracticeResult:
      type: object
      properties:
        id: { type: integer }
        reviewPart: { type: ["string", "null"] }
        reviewCrops:
          type: array
          items: { $ref: "#/components/schemas/DiagramCrop" }
        reviewTags:
          type: array
          items: { type: string }
        reviewCrop:
          oneOf:
            - $ref: "#/components/schemas/DiagramCrop"
            - type: "null"
      required: [id, reviewPart, reviewTags]

    PracticeVariation:
      type: object
      properties:
        id:             { type: integer }
        practiceId:     { type: integer }
        sourceFile:     { type: string }
        sessionDate:    { type: ["string", "null"] }
        part:           { type: string }
        rules:          { type: ["string", "null"] }
        tasks:          { type: ["string", "null"] }
        progressions:   { type: ["string", "null"] }
        coachingPoints: { type: ["string", "null"] }
        players:        { type: ["string", "null"] }
        size:           { type: ["string", "null"] }
        timing:         { type: ["string", "null"] }
        scoring:        { type: ["string", "null"] }
        intensity:      { type: ["string", "null"] }
      required: [id, practiceId, sourceFile, sessionDate, part, rules, tasks, progressions, coachingPoints, players, size, timing, scoring, intensity]

    PracticeVariationList:
      type: array
      items: { $ref: "#/components/schemas/PracticeVariation" }

    LibraryPracticeList:
      type: array
      items: { $ref: "#/components/schemas/LibraryPractice" }

    LibraryFlagRequest:
      type: object
      properties:
        needsReview: { type: boolean }
      required: [needsReview]

    LibraryFlagResult:
      type: object
      properties:
        id:          { type: integer }
        needsReview: { type: boolean }
      required: [id, needsReview]

    SessionSummary:
      type: object
      properties:
        id:            { type: integer }
        title:         { type: string }
        sessionDate:   { type: ["string", "null"] }
        team:          { type: ["string", "null"] }
        sessionNumber: { type: ["string", "null"] }
        theme:         { type: ["string", "null"] }
        updatedAt:     { type: string }
        partCount:     { type: integer }
      required: [id, title, updatedAt, partCount]

    SessionSummaryList:
      type: array
      items: { $ref: "#/components/schemas/SessionSummary" }

    SessionCreateRequest:
      type: object
      properties:
        title: { type: string }

    SessionGenerateRequest:
      type: object
      properties:
        theme:       { type: string, minLength: 3, description: "What the session trains, e.g. 'pressing from a mid block'" }
        players:     { type: integer, minimum: 4, maximum: 40 }
        minutes:     { type: integer, minimum: 30, maximum: 180 }
        endGame:     { type: string, enum: [small, medium, big], description: "Game cycle for the end game" }
        endGamePlan: { type: string, description: "Optional free-text plan/size for the end game" }
        includeActivation: { type: boolean, description: "Also fill the passing activation slot from the coach's tagged activations" }
      required: [theme, endGame]

    SessionUpdateRequest:
      type: object
      properties:
        title:         { type: string }
        sessionDate:   { type: ["string", "null"] }
        team:          { type: ["string", "null"] }
        sessionNumber: { type: ["string", "null"] }
        theme:         { type: ["string", "null"] }
        cycleCode:     { type: ["string", "null"] }
        location:      { type: ["string", "null"] }
        timeSlot:      { type: ["string", "null"] }
        comments:      { type: ["string", "null"] }
        squadText:     { type: ["string", "null"] }

    SessionPartUpsert:
      type: object
      properties:
        practiceId:     { type: ["integer", "null"] }
        rules:          { type: ["string", "null"] }
        tasks:          { type: ["string", "null"] }
        progressions:   { type: ["string", "null"] }
        coachingPoints: { type: ["string", "null"] }
        players:        { type: ["string", "null"] }
        size:           { type: ["string", "null"] }
        timing:         { type: ["string", "null"] }
        scoring:        { type: ["string", "null"] }
        intensity:      { type: ["string", "null"] }

    SessionPartPractice:
      type: object
      properties:
        id:    { type: integer }
        title: { type: ["string", "null"] }
        diagram:
          type: object
          description: Resolved diagram ({ bg, canvas, shapes }) rendered as SVG client-side
          additionalProperties: true
        reviewCrops:
          type: array
          items: { $ref: "#/components/schemas/DiagramCrop" }
      required: [id, diagram]

    SessionPartDetail:
      type: object
      properties:
        part:           { type: string, enum: [warmup, activation, introduction, main, endgame] }
        practice:
          oneOf:
            - $ref: "#/components/schemas/SessionPartPractice"
            - type: "null"
        rules:          { type: ["string", "null"] }
        tasks:          { type: ["string", "null"] }
        progressions:   { type: ["string", "null"] }
        coachingPoints: { type: ["string", "null"] }
        players:        { type: ["string", "null"] }
        size:           { type: ["string", "null"] }
        timing:         { type: ["string", "null"] }
        scoring:        { type: ["string", "null"] }
        intensity:      { type: ["string", "null"] }
      required: [part]

    SessionDetail:
      type: object
      properties:
        id:            { type: integer }
        title:         { type: string }
        sessionDate:   { type: ["string", "null"] }
        team:          { type: ["string", "null"] }
        sessionNumber: { type: ["string", "null"] }
        theme:         { type: ["string", "null"] }
        cycleCode:     { type: ["string", "null"] }
        location:      { type: ["string", "null"] }
        timeSlot:      { type: ["string", "null"] }
        comments:      { type: ["string", "null"] }
        squadText:     { type: ["string", "null"] }
        updatedAt:     { type: string }
        parts:
          type: array
          items: { $ref: "#/components/schemas/SessionPartDetail" }
      required: [id, title, updatedAt, parts]

    SessionDeleteResult:
      type: object
      properties:
        deleted: { type: boolean }
      required: [deleted]

    # ── Reflection journal ───────────────────────────────────────────────────

    JournalCycle:
      type: object
      properties:
        id:         { type: integer }
        title:      { type: string }
        weeksCount: { type: integer }
        startDate:  { type: ["string", "null"] }
        notes:      { type: ["string", "null"] }
        entryCount: { type: integer }
        updatedAt:  { type: string }
      required: [id, title, weeksCount, entryCount, updatedAt]

    JournalCycleList:
      type: array
      items: { $ref: "#/components/schemas/JournalCycle" }

    JournalEntry:
      type: object
      properties:
        id:        { type: integer }
        cycleId:   { type: ["integer", "null"] }
        weekNo:    { type: ["integer", "null"] }
        kind:      { type: string }
        title:     { type: ["string", "null"] }
        entryDate: { type: ["string", "null"] }
        source:    { type: string }
        content:
          type: object
          additionalProperties: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, kind, source, content, createdAt, updatedAt]

    JournalEntryList:
      type: array
      items: { $ref: "#/components/schemas/JournalEntry" }

    JournalCycleDetail:
      type: object
      properties:
        id:         { type: integer }
        title:      { type: string }
        weeksCount: { type: integer }
        startDate:  { type: ["string", "null"] }
        notes:      { type: ["string", "null"] }
        updatedAt:  { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/JournalEntry" }
      required: [id, title, weeksCount, updatedAt, entries]

    JournalCycleCreateRequest:
      type: object
      properties:
        title:      { type: string, minLength: 1 }
        weeksCount: { type: integer, minimum: 1, maximum: 12 }
        startDate:  { type: string }
        notes:      { type: string }
      required: [title, weeksCount]

    JournalCycleUpdateRequest:
      type: object
      properties:
        title:      { type: string, minLength: 1 }
        weeksCount: { type: integer, minimum: 1, maximum: 12 }
        startDate:  { type: ["string", "null"] }
        notes:      { type: ["string", "null"] }

    JournalEntryUpsertRequest:
      type: object
      properties:
        content:
          type: object
          additionalProperties: { type: string }
        entryDate: { type: string }
        source:    { type: string, enum: [manual, voice] }
      required: [content]

    JournalReflectionCreateRequest:
      type: object
      properties:
        kind:      { type: string, enum: [session_reflection, match_reflection] }
        title:     { type: string }
        entryDate: { type: string }
        source:    { type: string, enum: [manual, voice] }
        content:
          type: object
          additionalProperties: { type: string }
      required: [kind, content]

    JournalReflectionUpdateRequest:
      type: object
      properties:
        title:     { type: ["string", "null"] }
        entryDate: { type: ["string", "null"] }
        content:
          type: object
          additionalProperties: { type: string }

    MatchPrepReport:
      type: object
      properties:
        id:        { type: integer }
        kind:      { type: string, enum: [monday, friday] }
        title:     { type: string }
        opponent:  { type: ["string", "null"] }
        matchDate: { type: ["string", "null"] }
        data:
          type: object
          additionalProperties: true
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, kind, title, opponent, matchDate, data, createdAt, updatedAt]

    MatchPrepReportCreateRequest:
      type: object
      properties:
        kind:      { type: string, enum: [monday, friday] }
        title:     { type: string, minLength: 1 }
        opponent:  { type: string }
        matchDate: { type: string }
        data:
          type: object
          additionalProperties: true
      required: [kind, title, data]

    MatchPrepReportUpdateRequest:
      type: object
      properties:
        title:     { type: string, minLength: 1 }
        opponent:  { type: ["string", "null"] }
        matchDate: { type: ["string", "null"] }
        data:
          type: object
          additionalProperties: true

    JournalDeleteResult:
      type: object
      properties:
        deleted: { type: boolean }
      required: [deleted]

    # ── Voice interview ──────────────────────────────────────────────────────

    InterviewSpeakRequest:
      type: object
      properties:
        text: { type: string, minLength: 1, maxLength: 2000 }
      required: [text]

    InterviewSpeakResponse:
      type: object
      properties:
        audioBase64: { type: string }
        mimeType:    { type: string }
      required: [audioBase64, mimeType]

    InterviewTurnRequest:
      type: object
      properties:
        phase:
          type: string
          enum: [answer, confirm]
        question: { type: string, minLength: 1 }
        hint:     { type: string }
        priorAnswer: { type: string }
        probeUsed:   { type: boolean }
        audioBase64: { type: string, minLength: 1 }
        audioMimeType: { type: string }
        # "date": the answer is a spoken date/day reference; resolve it to dd.mm.yyyy
        mode: { type: string, enum: [date] }
      required: [phase, question, audioBase64]

    InterviewTurnResponse:
      type: object
      properties:
        transcript: { type: string }
        action:
          type: string
          enum: [probe, confirm, next, continue]
        say: { type: ["string", "null"] }
        # dd.mm.yyyy when mode=date and the reply could be resolved
        dateResolved: { type: ["string", "null"] }
      required: [transcript, action]

    InterviewWriteupRequest:
      type: object
      properties:
        kind:  { type: string }
        title: { type: string }
        qa:
          type: array
          items:
            type: object
            properties:
              fieldId:  { type: string }
              label:    { type: string }
              hint:     { type: string }
              answers:
                type: array
                items: { type: string }
            required: [fieldId, label, answers]
      required: [kind, qa]

    WeekAheadBriefRequest:
      type: object
      properties:
        opponent: { type: string, minLength: 1 }
        # Condensed plain-text blocks assembled client-side
        reflectionsText:    { type: string }
        lastVsOpponentText: { type: string }
        theirGamesText:     { type: string }
        ourGamesText:       { type: string }
      required: [opponent]

    WeekAheadBriefResponse:
      type: object
      properties:
        review:
          type: array
          items: { type: string }
        pointers:
          type: array
          items: { type: string }
      required: [review, pointers]

    PrematchBriefRequest:
      type: object
      properties:
        opponent:      { type: string, minLength: 1 }
        formation:     { type: string }
        gamePlanNotes: { type: string }
        # Condensed plain-text opponent scout block assembled client-side
        scoutText:     { type: string }
      required: [opponent]

    PrematchUnitObjectives:
      type: object
      properties:
        theme:
          type: string
        gk:
          type: array
          items: { type: string }
        defenders:
          type: array
          items: { type: string }
        midfielders:
          type: array
          items: { type: string }
        attackers:
          type: array
          items: { type: string }
      required: [theme, gk, defenders, midfielders, attackers]

    PrematchBriefResponse:
      type: object
      properties:
        bp:
          $ref: "#/components/schemas/PrematchUnitObjectives"
        bpo:
          $ref: "#/components/schemas/PrematchUnitObjectives"
      required: [bp, bpo]

    InterviewWriteupResponse:
      type: object
      properties:
        content:
          type: object
          additionalProperties: { type: string }
      required: [content]
