openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Belconnen United FC Performance Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player management
  - name: teams
    description: Team management
  - name: seasons
    description: Season management
  - name: matches
    description: Match data
  - name: goals
    description: Goal event data
  - name: player-stats
    description: Player match statistics
  - name: gps
    description: GPS / Catapult session data
  - name: testing
    description: Athletic testing results
  - name: analytics
    description: Aggregated analytics and summaries
  - name: auth
    description: Data-entry authentication
  - name: entry
    description: Data entry (composite writes across league + Belconnen tables)
  - name: library
    description: Session-practice library extracted from the coaching slide deck
  - name: sessions
    description: Training-session builder (assembled from library practices)
  - name: journal
    description: Reflection journal (A-diploma cycles + standalone coach reflections)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── PLAYERS ────────────────────────────────────────────────────────────────

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      parameters:
        - name: teamId
          in: query
          schema: { type: integer }
        - name: seasonId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  # ─── TEAMS ──────────────────────────────────────────────────────────────────

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all teams
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get a team
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  # ─── SEASONS ────────────────────────────────────────────────────────────────

  /leagues:
    get:
      operationId: listLeagues
      tags: [seasons]
      summary: List all leagues (competitions)
      responses:
        "200":
          description: List of leagues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeagueInfo"
    post:
      operationId: createLeague
      tags: [seasons]
      summary: Create a new league (competition)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeagueInput"
      responses:
        "201":
          description: Created league
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueInfo"

  /seasons:
    get:
      operationId: listSeasons
      tags: [seasons]
      summary: List all seasons
      responses:
        "200":
          description: List of seasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Season"
    post:
      operationId: createSeason
      tags: [seasons]
      summary: Create a season
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeasonInput"
      responses:
        "201":
          description: Created season
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"

  # ─── MATCHES ────────────────────────────────────────────────────────────────

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches
      parameters:
        - name: teamId
          in: query
          schema: { type: integer }
        - name: seasonId
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"
    post:
      operationId: createMatch
      tags: [matches]
      summary: Create a match record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "201":
          description: Created match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a match
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
    patch:
      operationId: updateMatch
      tags: [matches]
      summary: Update a match
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchUpdate"
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  # ─── PLAYER MATCH STATS ─────────────────────────────────────────────────────

  /player-stats:
    get:
      operationId: listPlayerStats
      tags: [player-stats]
      summary: List player match stats
      parameters:
        - name: matchId
          in: query
          schema: { type: integer }
        - name: playerId
          in: query
          schema: { type: integer }
        - name: teamId
          in: query
          schema: { type: integer }
        - name: seasonId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of player stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerStat"
    post:
      operationId: createPlayerStat
      tags: [player-stats]
      summary: Record player stats for a match
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerStatInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStat"

  # ─── GOALS ──────────────────────────────────────────────────────────────────

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List goal events
      parameters:
        - name: matchId
          in: query
          schema: { type: integer }
        - name: teamId
          in: query
          schema: { type: integer }
        - name: seasonId
          in: query
          schema: { type: integer }
        - name: scorerTeam
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of goal events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Record a goal event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /goals/{id}:
    patch:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal event (e.g. set X/Y coordinates)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalUpdate"
      responses:
        "200":
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal event
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ─── GPS SESSIONS ───────────────────────────────────────────────────────────

  /gps-sessions:
    get:
      operationId: listGpsSessions
      tags: [gps]
      summary: List GPS sessions
      parameters:
        - name: playerId
          in: query
          schema: { type: integer }
        - name: year
          in: query
          schema: { type: string }
        - name: teamId
          in: query
          schema: { type: integer }
        - name: round
          in: query
          schema: { type: string }
        - name: playerName
          in: query
          schema: { type: string }
        - name: split
          in: query
          description: Filter by split name (e.g. game, 1st.half, 2nd.half)
          schema: { type: string }
      responses:
        "200":
          description: List of GPS sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpsSession"
    post:
      operationId: createGpsSession
      tags: [gps]
      summary: Create a GPS session record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpsSessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpsSession"

  /gps-player-positions:
    get:
      operationId: listGpsPlayerPositions
      tags: [gps]
      summary: List playing positions for GPS-logged players
      responses:
        "200":
          description: Player positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpsPlayerPosition"
    put:
      operationId: saveGpsPlayerPositions
      tags: [gps]
      summary: Upsert player positions (a null position removes the entry)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/GpsPlayerPositionInput"
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpsPlayerPositionsSaveResult"

  # ─── ATHLETIC TESTING ───────────────────────────────────────────────────────

  /athletic-tests:
    get:
      operationId: listAthleticTests
      tags: [testing]
      summary: List athletic test results
      parameters:
        - name: playerId
          in: query
          schema: { type: integer }
        - name: year
          in: query
          schema: { type: string }
        - name: teamId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of athletic test results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AthleticTest"
    post:
      operationId: createAthleticTest
      tags: [testing]
      summary: Record an athletic test result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AthleticTestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AthleticTest"

  # ─── ANALYTICS (WOW endpoints) ──────────────────────────────────────────────

  /analytics/season-summary:
    get:
      operationId: getSeasonSummary
      tags: [analytics]
      summary: Get aggregated season summary stats
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Season summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonSummary"

  /analytics/player-leaderboard:
    get:
      operationId: getPlayerLeaderboard
      tags: [analytics]
      summary: Get player rankings (goals, assists, minutes, appearances)
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Player leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerLeaderboardEntry"

  /analytics/league-ladder:
    get:
      operationId: getLeagueLadder
      tags: [analytics]
      summary: Get current league ladder standings
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: League ladder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LadderEntry"

  /analytics/team-form:
    get:
      operationId: getTeamForm
      tags: [analytics]
      summary: Get team recent form
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Recent match form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamForm"

  /analytics/goals-by-interval:
    get:
      operationId: getGoalsByInterval
      tags: [analytics]
      summary: Goals scored and conceded by 15-minute interval
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: lastNMatches
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Goals by interval
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalIntervalBucket"

  /analytics/goal-breakdown:
    get:
      operationId: getGoalBreakdown
      tags: [analytics]
      summary: Focus team's own goals broken down by goal type and detail dimensions
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Goal breakdowns by type and detail dimension
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalBreakdownResponse"

  /analytics/opponent-clubs:
    get:
      operationId: getOpponentClubs
      tags: [analytics]
      summary: Get list of opponent clubs for the selected team+season
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Sorted list of opponent club names
          content:
            application/json:
              schema:
                type: array
                items: { type: string }

  /analytics/opponent-leaderboard:
    get:
      operationId: getOpponentLeaderboard
      tags: [analytics]
      summary: Player stats for a specific opponent club
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: club
          in: query
          required: true
          schema: { type: string }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Opponent leaderboard with head-to-head record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpponentLeaderboardResponse"

  /analytics/goals-by-opponent:
    get:
      operationId: getGoalsByOpponent
      tags: [analytics]
      summary: Per-player goals broken down by opponent, with minutes played against each
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Goals by opponent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalsByOpponentResponse"

  /analytics/assists-by-opponent:
    get:
      operationId: getAssistsByOpponent
      tags: [analytics]
      summary: Per-player assists broken down by opponent, with minutes played against each
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Assists by opponent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistsByOpponentResponse"

  /analytics/opponent-goal-breakdown:
    get:
      operationId: getOpponentGoalBreakdown
      tags: [analytics]
      summary: All goal details (scored & conceded) in matches vs a specific opponent club
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: club
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Goal breakdown for matches vs this club
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpponentGoalBreakdownResponse"

  /analytics/opponent-profile:
    get:
      operationId: getOpponentProfile
      tags: [analytics]
      summary: Full club-centric scouting profile across ALL of a club's league games
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: club
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Club scouting profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpponentProfileResponse"

  /analytics/player-timeline:
    get:
      operationId: getPlayerTimeline
      tags: [analytics]
      summary: One player's match-by-match starts/bench/out record across their club's league season
      parameters:
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: club
          in: query
          required: true
          schema: { type: string }
        - name: player
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Chronological per-match appearance timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerTimelineResponse"

  /analytics/opponent-players-by-opponent:
    get:
      operationId: getOpponentPlayersByOpponent
      tags: [analytics]
      summary: Per-player goals/assists/minutes for a club, broken down by the opponent they faced
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: club
          in: query
          required: true
          schema: { type: string }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Club players' goals/assists broken down by opponent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpponentPlayersByOpponentResponse"

  /analytics/goal-combos:
    get:
      operationId: getGoalCombos
      tags: [analytics]
      summary: Focus team's assist->scorer goal partnerships (combo threat)
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Ranked assist->scorer partnerships for the focus team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalCombosResponse"

  /analytics/opponent-goal-combos:
    get:
      operationId: getOpponentGoalCombos
      tags: [analytics]
      summary: A selected club's assist->scorer goal partnerships (combo threat)
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: club
          in: query
          required: true
          schema: { type: string }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Ranked assist->scorer partnerships for the selected club
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalCombosResponse"

  /analytics/player-dna:
    get:
      operationId: getPlayerDna
      tags: [analytics]
      summary: A single focus-team player's scoring DNA (radar metrics + best-of callouts)
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: player
          in: query
          required: true
          schema: { type: string }
        - name: lastN
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Scoring DNA metrics for the selected player plus squad maxima for radar scaling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDnaResponse"

  /analytics/opponent-player-dna:
    get:
      operationId: getOpponentPlayerDna
      tags: [analytics]
      summary: A selected club player's scoring DNA (computed from the whole-league tables)
      parameters:
        - name: teamId
          in: query
          required: true
          schema: { type: integer }
        - name: seasonId
          in: query
          required: true
          schema: { type: integer }
        - name: club
          in: query
          required: true
          schema: { type: string }
        - name: player
          in: query
          required: true
